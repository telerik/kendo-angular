<section class="page-section">
  <div class="page-header">
    <div>
      <h1 class="page-title">Patients</h1>
      <p class="page-subtitle">
        Monitor patient trends, vitals, lab results, and risk levels in one place
      </p>
    </div>
    <div class="page-actions">
      <button
        kendoButton
        class="ai-assistance-btn"
        rounded="full"
        [svgIcon]="sparklesIcon"
        (click)="toggleChat()"
      >
        AI Assistance
      </button>
      <button
        kendoButton
        fillMode="outline"
        rounded="full"
        [svgIcon]="downloadIcon"
        (click)="exportToExcel()"
      >
        Export
      </button>
    </div>
  </div>

  <div class="patients-content-wrapper" [class.chat-visible]="chatVisible">
    <kendo-card class="patients-card" width="100%">
      <kendo-card-body>
        <kendo-grid
          [kendoGridBinding]="patients"
          [sortable]="true"
          [filterable]="true"
          [pageable]="{
            pageSizes: [10, 15, 20],
            previousNext: true,
            info: true,
          }"
          [pageSize]="10"
          adaptiveMode="auto"
        >
          <kendo-grid-column field="name" title="Patient Name" [width]="220">
            <ng-template kendoGridCellTemplate let-dataItem>
              <div class="patient-cell">
                <kendo-avatar [imageSrc]="dataItem.avatar" size="medium" shape="circle">
                </kendo-avatar>
                <span>{{ dataItem.name }}</span>
              </div>
            </ng-template>
          </kendo-grid-column>

          <kendo-grid-column
            field="age"
            title="Age"
            [width]="120"
            filter="numeric"
          ></kendo-grid-column>

          <kendo-grid-column field="status" title="Status" [width]="160">
            <ng-template kendoGridCellTemplate let-dataItem>
              <kendo-chip
                [label]="dataItem.status"
                [themeColor]="getPatientStatusColor(dataItem.status)"
                [removable]="false"
                rounded="full"
              ></kendo-chip>
            </ng-template>
          </kendo-grid-column>

          <kendo-grid-column field="gender" title="Gender" [width]="130"></kendo-grid-column>

          <kendo-grid-column field="bloodType" title="Blood Type" [width]="150"></kendo-grid-column>

          <kendo-grid-column field="ward" title="Ward" [width]="170"></kendo-grid-column>

          <kendo-grid-column field="diagnosis" title="Diagnosis" [width]="190"></kendo-grid-column>

          <kendo-grid-column title="Actions" [width]="160" [sortable]="false" [filterable]="false">
            <ng-template kendoGridCellTemplate let-dataItem>
              <button
                kendoButton
                fillMode="flat"
                class="view-profile-link"
                (click)="viewProfile(dataItem.id)"
              >
                <kendo-svgicon [icon]="eyeIcon" size="small"></kendo-svgicon>
                View Profile
              </button>
            </ng-template>
          </kendo-grid-column>
          <kendo-grid-excel fileName="Patients.xlsx" [fetchData]="allData"></kendo-grid-excel>
        </kendo-grid>
      </kendo-card-body>
    </kendo-card>

    @if (chatVisible) {
      <kendo-card class="ai-chat-card">
        <kendo-card-body>
          <kendo-chat
            [messages]="chatMessages"
            [authorId]="currentUser.id"
            [suggestions]="chatSuggestions"
            [showUsername]="false"
            [messageContextMenuActions]="[]"
            timestampVisibility="hidden"
            (sendMessage)="onSendChatMessage($event)"
            (suggestionExecute)="onSuggestionClick($event)"
            class="ai-chat-container"
            [style.width.%]="100"
            [style.height.%]="100"
          >
            <ng-template kendoChatHeaderTemplate>
              <div style="display: flex; align-items: center; padding: 8px">
                <kendo-svg-icon
                  [icon]="sparklesIcon"
                  style="margin-right: 8px; color: #4b5ffa"
                ></kendo-svg-icon>
                <strong>AI Assistant</strong>
              </div>
            </ng-template>
            <ng-template kendoChatReceiverMessageTemplate let-message>
              <div class="receiver-message" [innerHTML]="message.text | markdown"></div>
            </ng-template>
          </kendo-chat>
        </kendo-card-body>
      </kendo-card>
    }
  </div>
</section>
